<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PawTrack - New Log</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Manrope', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "tertiary": "#8e4e14",
                      "on-secondary-fixed-variant": "#174974",
                      "tertiary-container": "#ea9959",
                      "secondary-fixed": "#d0e4ff",
                      "inverse-primary": "#88d6b4",
                      "surface-container-low": "#f4f3f1",
                      "on-error": "#ffffff",
                      "on-error-container": "#93000a",
                      "on-primary-fixed": "#002115",
                      "error": "#ba1a1a",
                      "on-secondary-container": "#295783",
                      "primary": "#146b4f",
                      "secondary-container": "#a2cdff",
                      "on-tertiary-fixed-variant": "#6f3800",
                      "on-secondary-fixed": "#001d35",
                      "background": "#faf9f7",
                      "surface-container-highest": "#e3e2e0",
                      "outline-variant": "#bec9c2",
                      "on-primary-fixed-variant": "#00513a",
                      "tertiary-fixed-dim": "#ffb780",
                      "surface-container-high": "#e9e8e6",
                      "surface-dim": "#dadad8",
                      "surface-container": "#efeeec",
                      "tertiary-fixed": "#ffdcc4",
                      "on-tertiary-fixed": "#2f1400",
                      "on-surface": "#1a1c1b",
                      "inverse-on-surface": "#f1f1ef",
                      "surface": "#faf9f7",
                      "surface-container-lowest": "#ffffff",
                      "on-surface-variant": "#3f4943",
                      "surface-bright": "#faf9f7",
                      "on-primary": "#ffffff",
                      "error-container": "#ffdad6",
                      "on-primary-container": "#004a34",
                      "surface-variant": "#e3e2e0",
                      "secondary-fixed-dim": "#9fcafc",
                      "outline": "#6f7a73",
                      "on-secondary": "#ffffff",
                      "on-background": "#1a1c1b",
                      "surface-tint": "#146b4f",
                      "primary-fixed": "#a3f3cf",
                      "secondary": "#34618d",
                      "primary-container": "#6dbb9a",
                      "inverse-surface": "#2f3130",
                      "on-tertiary": "#ffffff",
                      "primary-fixed-dim": "#88d6b4",
                      "on-tertiary-container": "#653200"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "padding-card": "1rem",
                      "stack-gap": "1.25rem",
                      "gutter-card": "0.75rem",
                      "margin-page": "1rem"
              },
              "fontSize": {
                      "body-lg": ["17px", {"lineHeight": "24px", "letterSpacing": "-0.4px", "fontWeight": "400"}],
                      "label-caps": ["13px", {"lineHeight": "18px", "letterSpacing": "0.5px", "fontWeight": "600"}],
                      "body-sm": ["15px", {"lineHeight": "20px", "letterSpacing": "-0.2px", "fontWeight": "400"}],
                      "headline-md": ["22px", {"lineHeight": "28px", "letterSpacing": "0px", "fontWeight": "600"}],
                      "display-lg": ["34px", {"lineHeight": "41px", "letterSpacing": "-0.5px", "fontWeight": "700"}]
              }
            },
          },
        }
      </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen pb-32">
<!-- TopAppBar -->
<header class="bg-stone-50/80 dark:bg-stone-900/80 backdrop-blur-md font-manrope antialiased tracking-tight docked full-width top-0 sticky z-40 border-b border-stone-200/50 dark:border-stone-800/50 shadow-none flex items-center justify-between px-4 w-full h-16">
<div class="flex items-center gap-3">
<button class="active:scale-95 transition-transform duration-200 text-emerald-600 dark:text-emerald-400">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="text-lg font-bold text-stone-900 dark:text-stone-50">New Log</h1>
</div>
<button class="text-emerald-600 dark:text-emerald-400 font-bold px-4 py-2 hover:opacity-80 transition-opacity active:scale-95">Save</button>
</header>
<main class="px-margin-page mt-stack-gap max-w-lg mx-auto">
<!-- Hero Context -->
<div class="mb-8 text-center">
<div class="inline-flex p-4 rounded-full bg-primary-container/20 text-primary mb-4">
<span class="material-symbols-outlined text-[32px]" data-icon="restaurant" style="font-variation-settings: 'FILL' 1;">restaurant</span>
</div>
<h2 class="font-display-lg text-display-lg text-on-surface">Daily Nourishment</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-1">Track what and when they consume today.</p>
</div>
<form class="flex flex-col gap-stack-gap">
<!-- Type Selector (Bento Style) -->
<div class="grid grid-cols-2 gap-3">
<label class="relative cursor-pointer group">
<input checked="" class="peer sr-only" name="log_type" type="radio" value="food"/>
<div class="flex flex-col items-center gap-2 p-4 bg-surface-container-lowest rounded-xl border-2 border-transparent peer-checked:border-primary peer-checked:bg-primary/5 transition-all shadow-sm">
<span class="material-symbols-outlined text-on-surface-variant peer-checked:text-primary" data-icon="restaurant">restaurant</span>
<span class="font-label-caps text-label-caps uppercase tracking-wider">Food</span>
</div>
</label>
<label class="relative cursor-pointer group">
<input class="peer sr-only" name="log_type" type="radio" value="water"/>
<div class="flex flex-col items-center gap-2 p-4 bg-surface-container-lowest rounded-xl border-2 border-transparent peer-checked:border-secondary peer-checked:bg-secondary/5 transition-all shadow-sm">
<span class="material-symbols-outlined text-on-surface-variant peer-checked:text-secondary" data-icon="water_drop">water_drop</span>
<span class="font-label-caps text-label-caps uppercase tracking-wider">Water</span>
</div>
</label>
</div>
<!-- Quantity Input Card -->
<div class="bg-surface-container-lowest p-padding-card rounded-xl shadow-[0_4px_12px_rgba(0,0,0,0.04)] border border-surface-container-highest">
<label class="block font-label-caps text-label-caps text-on-surface-variant mb-4 uppercase">Portion &amp; Amount</label>
<div class="flex items-center gap-4">
<div class="flex-1">
<input class="w-full text-[32px] font-bold bg-transparent border-none focus:ring-0 p-0 text-on-surface placeholder:text-surface-container-highest" placeholder="2.5" type="number"/>
</div>
<div class="h-10 w-[1px] bg-surface-container-highest"></div>
<select class="bg-surface-container rounded-lg border-none font-body-sm text-body-sm px-4 py-2 focus:ring-primary focus:ring-1">
<option>Cups</option>
<option>Grams</option>
<option>ml</option>
<option>Oz</option>
</select>
</div>
</div>
<!-- Time and Date Card -->
<div class="bg-surface-container-lowest p-padding-card rounded-xl shadow-[0_4px_12px_rgba(0,0,0,0.04)] border border-surface-container-highest">
<div class="flex flex-col gap-4">
<div class="flex items-center justify-between">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary" data-icon="schedule">schedule</span>
<span class="font-body-lg text-body-lg">Log Time</span>
</div>
<input class="bg-surface-container rounded-lg border-none font-body-sm text-body-sm px-3 py-1 focus:ring-primary" type="time" value="08:30"/>
</div>
<div class="h-[1px] bg-surface-container-highest"></div>
<div class="flex items-center justify-between">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary" data-icon="calendar_today">calendar_today</span>
<span class="font-body-lg text-body-lg">Date</span>
</div>
<input class="bg-surface-container rounded-lg border-none font-body-sm text-body-sm px-3 py-1 focus:ring-primary" type="date" value="2024-05-20"/>
</div>
</div>
</div>
<!-- Notes and Behavior Card -->
<div class="bg-surface-container-lowest p-padding-card rounded-xl shadow-[0_4px_12px_rgba(0,0,0,0.04)] border border-surface-container-highest">
<label class="block font-label-caps text-label-caps text-on-surface-variant mb-3 uppercase">Notes &amp; Behavior</label>
<textarea class="w-full bg-surface-container rounded-xl border-none p-4 font-body-sm text-body-sm focus:ring-primary placeholder:text-on-surface-variant/40 resize-none" placeholder="Brand, appetite level, or unusual behavior..." rows="3"></textarea>
<div class="mt-4 flex flex-wrap gap-2">
<button class="px-3 py-1.5 rounded-full bg-primary/10 text-primary font-label-caps text-[11px] border border-primary/20 hover:bg-primary/20 transition-colors" type="button">Vigorous Appetite</button>
<button class="px-3 py-1.5 rounded-full bg-surface-container text-on-surface-variant font-label-caps text-[11px] border border-transparent hover:border-surface-container-highest transition-colors" type="button">Slow Eater</button>
<button class="px-3 py-1.5 rounded-full bg-surface-container text-on-surface-variant font-label-caps text-[11px] border border-transparent hover:border-surface-container-highest transition-colors" type="button">Refused Food</button>
</div>
</div>
<!-- Decorative Image Insight -->
<div class="relative w-full h-32 rounded-2xl overflow-hidden mt-2 group">
<img class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" data-alt="Close-up of a happy golden retriever looking up with expectations next to its clean metal food bowl in a bright kitchen" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAImc9eu24d0UkMlPLlQl40FEa3vZ8BMTrGXqHCS6CVnflOqqZ7n7ITrJqkaSVah4q4AcSB2vXF1EJhJq_RUqaB1nt02cSCoWjj3LtpcUTOoumHT3UuqJ_WD6HJwLm4rz55Cnam8qq3nRKbnNhkdi5SonQa9LBLveQVBVaJ-Zeh3zk7kXvseC8BIsXTdJV6jq4g8EtRZjXwH96_2_6DlHNvCxfX2WvOL74UTlPojfa7frBe6aX-lz_gcHaJCUfAsWnq_ZVbrCSPjo49"/>
<div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent flex items-end p-4">
<p class="text-white text-body-sm font-semibold italic">"Hydration is key for active days!"</p>
</div>
</div>
</form>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-safe pt-2 h-20 bg-stone-50/90 dark:bg-stone-900/90 backdrop-blur-lg border-t border-stone-200/60 dark:border-stone-800/60 shadow-none">
<div class="flex flex-col items-center justify-center text-stone-400 dark:text-stone-500 px-3 py-1 hover:text-emerald-500 dark:hover:text-emerald-300 active:scale-90 transition-all duration-150">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="text-[10px] font-manrope font-semibold tracking-wide">Home</span>
</div>
<div class="flex flex-col items-center justify-center text-emerald-600 dark:text-emerald-400 bg-emerald-50/50 dark:bg-emerald-900/20 rounded-xl px-3 py-1 active:scale-90 transition-all duration-150">
<span class="material-symbols-outlined" data-icon="menu_book" style="font-variation-settings: 'FILL' 1;">menu_book</span>
<span class="text-[10px] font-manrope font-semibold tracking-wide">Journal</span>
</div>
<div class="flex flex-col items-center justify-center text-stone-400 dark:text-stone-500 px-3 py-1 hover:text-emerald-500 dark:hover:text-emerald-300 active:scale-90 transition-all duration-150">
<span class="material-symbols-outlined" data-icon="monitor_heart">monitor_heart</span>
<span class="text-[10px] font-manrope font-semibold tracking-wide">Health</span>
</div>
<div class="flex flex-col items-center justify-center text-stone-400 dark:text-stone-500 px-3 py-1 hover:text-emerald-500 dark:hover:text-emerald-300 active:scale-90 transition-all duration-150">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="text-[10px] font-manrope font-semibold tracking-wide">Profile</span>
</div>
</nav>
</body></html>
